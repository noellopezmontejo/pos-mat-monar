server {
    listen 80;
    server_name 192.168.1.141; # Cambia esto por la IP pública de tu servidor o tu dominio (ej. pos.monar.com)

    # Límite de tamaño para subida de imágenes/archivos
    client_max_body_size 50M;

    # Directorio de los archivos estáticos compilados del Frontend (Vite)
    # Cambia /var/www/pos-mat-monar por la ruta real donde clonaste el proyecto en el servidor
    root /var/www/pos-mat-monar/dist;
    index index.html;

    # Compresión Gzip para mejorar el rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Frontend Routing (Soporte para React Router SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el Backend API (Express)
    location /api/ {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Servir archivos estáticos subidos por los usuarios (uploads)
    location /uploads/ {
        # Cambia /var/www/pos-mat-monar por la ruta real donde clonaste el proyecto en el servidor
        alias /var/www/pos-mat-monar/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        
        # Opcional: Si el backend maneja cierta lógica de uploads, se puede usar proxy_pass
        # proxy_pass http://127.0.0.1:4002/uploads/;
    }
}
